<svg viewBox="0 0 140 54" xmlns="http://www.w3.org/2000/svg">
  <!-- Diamante izquierdo: azul -->
  <polygon points="4,3 22,3 13,19" fill="#20679e"/>
  <!-- Diamante derecho: teal -->
  <polygon points="22,3 40,3 31,19" fill="#20c5b5"/>
  <!-- Diamante inferior: teal oscuro -->
  <polygon points="13,19 31,19 22,33" fill="#1aada0"/>

  <!-- Nodo central — circulo en vez de rect blanco -->
  <circle cx="22" cy="19" r="5.5" fill="rgba(255,255,255,0.95)"/>
  <circle cx="22" cy="19" r="2.8" fill="#20c5b5"/>

  <!-- Vértices -->
  <circle cx="4"  cy="3"  r="1.8" fill="#20679e"/>
  <circle cx="40" cy="3"  r="1.8" fill="#20c5b5"/>
  <circle cx="22" cy="33" r="1.8" fill="#1aada0"/>

  <!-- VICTORIA -->
  <text x="50" y="17"
    font-family="Arial Black, Arial, Helvetica, sans-serif"
    font-weight="900"
    font-size="15"
    fill="#1a2e45"
    dominant-baseline="auto"
    letter-spacing="0.5">VICTORIA</text>

  <!-- Línea teal -->
  <rect x="50" y="20" width="88" height="1.8" fill="#20c5b5"/>

  <!-- PATARROYO -->
  <text x="50" y="33"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="400"
    font-size="9.5"
    fill="#20679e"
    dominant-baseline="auto"
    letter-spacing="2">PATARROYO</text>

  <!-- fullstack developer -->
  <text x="50" y="47"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="400"
    font-size="7.5"
    fill="#8a9ab5"
    dominant-baseline="auto"
    letter-spacing="0.8">fullstack developer</text>
</svg>
